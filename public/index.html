<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StayAssistant AI</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            padding-top: 60px;
        }

        h1 {
            font-size: clamp(32px, 6vw, 48px);
            margin-bottom: 10px;
        }

        p {
            font-size: clamp(16px, 3.5vw, 20px);
            opacity: 0.8;
            line-height: 1.5;
        }

        button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
        }

        button:hover {
            background: #16a34a;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>StayAssistant AI</h1>

        <p>
            AI Concierge for Vacation Rentals
        </p>

        <p>
            Automatically answer guest questions about check-in, wifi, transport and local recommendations.
        </p>

        <a href="/chat.html">
            <button>Try the Demo</button>
        </a>

    </div>

    <script>
        window.addEventListener("load", function () {
            if (window.StayAssistant) {
                StayAssistant.init({
                    propertyId: "demo_property"
                });
            }
        });
    </script>

</body>

</html>
