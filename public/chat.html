<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="chat.css">

    <!-- THEMES -->
    <link rel="stylesheet" href="themes/minimal.css">
    <link rel="stylesheet" href="themes/luxury.css">
    <link rel="stylesheet" href="themes/modern.css">
    <link rel="stylesheet" href="themes/zen.css">
    <link rel="stylesheet" href="themes/zen-noir.css">

    <title>StayAssistant AI</title>



</head>

<script>
    (function () {
        document.documentElement.setAttribute("data-theme", "default");
        localStorage.setItem("stayassistant_theme", "default");
    })();

    (function () {

        const params = new URLSearchParams(window.location.search);
        const themeParam = params.get("theme");

        if (themeParam) {
            document.documentElement.setAttribute("data-theme", themeParam);
        }

    })();
</script>

<body>

    <div id="theme-panel-root"></div>

    <button id="theme-toggle-btn">🎨</button>

    <script>

        const params = new URLSearchParams(window.location.search);
        const isEmbed = params.get("embed");
        const isPreview = params.get("preview") === "true";

        if (isEmbed) {

            document.body.classList.add("embed-mode");

            const button = document.getElementById("chat-button");

            if (button) {
                button.style.display = "none";
            }
        }

        if (isPreview) {
            document.body.classList.add("embed-mode");

            const widget = document.getElementById("chat-widget");

            if (widget) {
                widget.classList.add("open"); // 👈 abierto por defecto
            }

            const button = document.getElementById("chat-button");
            if (button) {
                button.style.display = "none"; // 👈 ocultar botón en preview
            }
        }

    </script>

    <script>
        (function () {

            const params = new URLSearchParams(window.location.search);
            const isEmbed = params.get("embed");
            const isPreview = params.get("preview") === "true";

            // ❌ NO renderizar selector dentro de iframe
            if (isEmbed || isPreview) return;

            const root = document.getElementById("theme-panel-root");

            root.innerHTML = `
                <div class="theme-configurator">

                    <!-- CONTROLES -->
                    <div class="theme-grid-v2">

                        <div class="theme-card-v2" data-theme="default">
                            <div class="card-preview default"></div>
                            <span>Default</span>
                        </div>

                        <div class="theme-card-v2" data-theme="minimal">
                            <div class="card-preview minimal"></div>
                            <span>Minimal</span>
                        </div>

                        <div class="theme-card-v2" data-theme="luxury">
                            <div class="card-preview luxury"></div>
                            <span>Luxury</span>
                        </div>

                        <div class="theme-card-v2" data-theme="modern">
                            <div class="card-preview modern"></div>
                            <span>Modern</span>
                        </div>

                        <div class="theme-card-v2" data-theme="zen">
                            <div class="card-preview zen"></div>
                            <span>Zen</span>
                        </div>

                        <div class="theme-card-v2" data-theme="zen-noir">
                            <div class="card-preview zen-noir"></div>
                            <span>Zen Noir</span>
                        </div>

                    </div>

                </div>
            `;

        })();
    </script>

    <button id="chat-button" onclick="toggleChat()">
        💬 Concierge
    </button>

    <div id="chat-widget">

        <div class="chat-header">

            <h3 id="chat-property-name">StayAssistant</h3>

            <button id="close-chat">✕</button>

        </div>

        <div id="messages"></div>

        <div class="input-area">

            <input id="input" placeholder="Ask something..." />

            <button class="send" onclick="sendMessage()">

                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>

                </svg>

            </button>

        </div>

    </div>

    <script src="chat.js"></script>

    <script>

        function toggleChat() {

            const widget = document.getElementById("chat-widget");

            widget.classList.toggle("open");

        }

    </script>

    <script type="module">
        import { setTheme, getTheme } from "./theme.js";

        // asegurar estado correcto
        setTheme(getTheme());
    </script>

    <script type="module">
        import { setTheme, getTheme } from "./theme.js";

        (function () {

            const params = new URLSearchParams(window.location.search);
            const isEmbed = params.get("embed");
            const isPreview = params.get("preview") === "true";

            if (isEmbed || isPreview) return;

            const cards = document.querySelectorAll(".theme-card-v2");

            const current = getTheme() || "default";

            cards.forEach(c => c.classList.remove("active"));

            const activeCard = [...cards].find(c => c.dataset.theme === current);

            if (activeCard) {
                activeCard.classList.add("active");
            }

            cards.forEach(card => {

                card.addEventListener("click", () => {

                    const theme = card.dataset.theme;

                    setTheme(theme);

                    cards.forEach(c => c.classList.remove("active"));
                    card.classList.add("active");



                });

            });

        })();
    </script>

    <script>
        (function () {

            const btn = document.getElementById("theme-toggle-btn");

            if (!btn) return;

            btn.onclick = () => {

                const panel = document.querySelector(".theme-configurator");
                if (!panel) return;

                panel.classList.toggle("open");

            };

        })();
    </script>


</body>

</html>
