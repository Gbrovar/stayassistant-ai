<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>StayAssistant AI</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: #0b1220;
            margin: 0;
            height: 100vh;
        }

        /* BOTÓN FLOTANTE */

        #chat-button {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
        }

        #chat-button:hover {
            transform: scale(1.05);
        }

        /* WIDGET */

        #chat-widget {
            position: fixed;
            bottom: 80px;
            right: 25px;
            width: 360px;
            background: #111827;
            border-radius: 14px;
            display: none;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
            overflow: hidden;
        }

        /* HEADER */

        #chat-widget h3 {
            margin: 0;
            padding: 14px 16px;
            background: #1f2937;
            font-size: 15px;
            color: white;
        }

        /* MENSAJES */

        #messages {
            padding: 15px;
            height: 320px;
            overflow-y: auto;
            font-size: 14px;
        }

        .message {
            margin-bottom: 10px;
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 10px;
            line-height: 1.4;
        }

        .user {
            background: #2563eb;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #1f2937;
            color: #e5e7eb;
        }

        /* INPUT AREA */

        .input-area {
            display: flex;
            padding: 10px;
            background: #0f172a;
            border-top: 1px solid #1f2937;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #1f2937;
            color: white;
            outline: none;
        }

        button.send {
            margin-left: 8px;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        /* QUICK BUTTONS */

        .quick-buttons {
            padding: 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .quick-buttons button {
            border: none;
            background: #1f2937;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .quick-buttons button:hover {
            background: #374151;
        }
    </style>


</head>

<body>

    <!-- botón flotante -->

    <button id="chat-button" onclick="toggleChat()">
        💬 Concierge
    </button>

    <!-- widget -->

    <div id="chat-widget">

        <h3>Ocean View Apartment</h3>

        <div id="messages"></div>

        <div class="input-area">

            <input id="input" placeholder="Ask about check-in, wifi or restaurants..." />

            <button class="send" onclick="sendMessage()">
                Send
            </button>

        </div>

        <div class="quick-buttons">

            <button onclick="quick('What time is check-in?')">Check-in</button>

            <button onclick="quick('Wifi password?')">Wifi</button>

            <button onclick="quick('Restaurants nearby?')">Food</button>

        </div>

    </div>

    <script src="chat.js"></script>

    <script>

        function toggleChat() {

            const widget = document.getElementById("chat-widget");

            if (widget.style.display === "none" || widget.style.display === "") {
                widget.style.display = "flex";
            } else {
                widget.style.display = "none";
            }

        }

    </script>

</body>

</html>
