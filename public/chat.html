<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="chat.css">

    <!-- THEMES -->
    <link rel="stylesheet" href="themes/minimal.css">
    <link rel="stylesheet" href="themes/luxury.css">
    <link rel="stylesheet" href="themes/modern.css">
    <link rel="stylesheet" href="themes/zen.css">
    <link rel="stylesheet" href="themes/zen-noir.css">

    <title>StayAssistant AI</title>



</head>

<script>
    (function () {
        const saved = localStorage.getItem("stayassistant_theme") || "default";
        document.documentElement.setAttribute("data-theme", saved);
    })();

    (function () {

        const params = new URLSearchParams(window.location.search);
        const themeParam = params.get("theme");

        if (themeParam) {
            document.documentElement.setAttribute("data-theme", themeParam);
        }

    })();
</script>

<body>

    <div class="theme-selector">

        <div class="theme-header">
            <span>Theme</span>
        </div>

        <div class="theme-grid">

            <button class="theme-card active" data-theme="default">
                <div class="preview default"></div>
                <span>Default</span>
            </button>

            <button class="theme-card" data-theme="minimal">
                <div class="preview minimal"></div>
                <span>Minimal</span>
            </button>

            <button class="theme-card" data-theme="luxury">
                <div class="preview luxury"></div>
                <span>Luxury</span>
            </button>

            <button class="theme-card" data-theme="modern">
                <div class="preview modern"></div>
                <span>Modern</span>
            </button>

            <button class="theme-card" data-theme="zen">
                <div class="preview zen"></div>
                <span>Zen</span>
            </button>

            <button class="theme-card" data-theme="zen-noir">
                <div class="preview zen-noir"></div>
                <span>Zen Noir</span>
            </button>

        </div>

    </div>

    <script>

        const params = new URLSearchParams(window.location.search);
        const isEmbed = params.get("embed");
        const isPreview = params.get("preview") === "true";

        if (isEmbed) {

            document.body.classList.add("embed-mode");

            const button = document.getElementById("chat-button");

            if (button) {
                button.style.display = "none";
            }
        }

        if (isPreview) {
            document.body.classList.add("embed-mode");

            const widget = document.getElementById("chat-widget");

            if (widget) {
                widget.classList.add("open"); // 👈 abierto por defecto
            }

            const button = document.getElementById("chat-button");
            if (button) {
                button.style.display = "none"; // 👈 ocultar botón en preview
            }
        }

    </script>

    <button id="chat-button" onclick="toggleChat()">
        💬 Concierge
    </button>

    <div id="chat-widget">

        <div class="chat-header">

            <h3 id="chat-property-name">StayAssistant</h3>

            <button id="close-chat">✕</button>

        </div>

        <div id="messages"></div>

        <div class="input-area">

            <input id="input" placeholder="Ask something..." />

            <button class="send" onclick="sendMessage()">

                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>

                </svg>

            </button>

        </div>

    </div>

    <script src="chat.js"></script>

    <script>

        function toggleChat() {

            const widget = document.getElementById("chat-widget");

            widget.classList.toggle("open");

        }

    </script>

    <script type="module">
        import { setTheme, getTheme } from "./theme.js";

        // asegurar estado correcto
        setTheme(getTheme());
    </script>

    <script type="module">
        import { setTheme, getTheme } from "./theme.js";

        const buttons = document.querySelectorAll(".theme-card");

        // estado inicial correcto
        const current = getTheme();

        buttons.forEach(btn => {
            if (btn.dataset.theme === current) {
                btn.classList.add("active");
            }
        });

        // click handler
        buttons.forEach(btn => {

            btn.addEventListener("click", () => {

                const theme = btn.dataset.theme;

                setTheme(theme);

                // UI update
                buttons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

            });

        });
    </script>

</body>

</html>
